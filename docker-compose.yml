services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jakartaee_app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: bd1
      DB_USER: root
      DB_PASSWORD: root
    networks:
      - red_app

  mysql:
    image: mysql:8.0
    container_name: mysql_bd1
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bd1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - red_app

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_bd1
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - red_app

volumes:
  mysql_data:

networks:
  red_app:
    driver: bridge
