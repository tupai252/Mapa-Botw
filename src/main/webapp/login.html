<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyrule Map - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="body-standalone-form">

    <div class="form-center-container">
        <div class="wireframe-card-box">
            <button class="close-card-btn" onclick="window.location.href='index.html'" aria-label="Cerrar y volver al mapa">✖</button>
            <h2 class="modal-form-title">INICIAR SESIÓN</h2>
            
            <form id="login-form-element" class="interactive-form">
                <input type="text" id="login-user" class="wireframe-input" placeholder="Nombre de usuario" required autocomplete="off">
                <input type="password" id="login-pass" class="wireframe-input" placeholder="Contraseña" required>
                
                <div class="form-navigation-link-zone" style="margin-top: -0.5rem; justify-content: flex-end;">
                    <a href="#" id="open-recovery-modal" class="switch-form-link" style="font-size: 0.85rem;">¿Olvidaste tu contraseña?</a>
                </div>
                
                <div class="form-action-button-zone">
                    <button type="submit" class="wireframe-submit-btn">ENTRAR AL REINO</button>
                </div>
            </form>

            <div class="form-navigation-link-zone" style="margin-top: 1.5rem;">
                <a href="register.html" class="switch-form-link">¿No tienes cuenta? Regístrate aquí</a>
            </div>
        </div>
    </div>

    <div id="recovery-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); display: flex; justify-content: center; align-items: center; z-index: 100;">
        <div class="modal-card wireframe-card-box">
            <button type="button" class="close-card-btn" id="close-recovery-modal">&times;</button>
            <h3 class="modal-form-title">RECUPERAR CLAVE</h3>
            <form id="recovery-form" class="interactive-form">
                <p style="color: var(--text-dark); font-size: 0.95rem; text-align: center; margin-bottom: 0.5rem;">Introduce tu correo y te enviaremos un enlace.</p>
                <input type="email" id="recovery-email-input" class="wireframe-input" placeholder="Correo electrónico" required autocomplete="off">
                <div class="form-action-button-zone">
                    <button type="submit" class="wireframe-submit-btn">ENVIAR ENLACE</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
